<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuizBase</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<header>
  <h1>QuizBase</h1>
  <span id="breadcrumb"></span>
  <span id="fact-count"></span>
  <div id="mode-toggle">
    <button class="mode-btn active" id="btn-study">Facts</button>
    <button class="mode-btn" id="btn-questions">Questions</button>
    <button class="mode-btn" id="btn-quiz">Quiz</button>
  </div>
</header>

<main>

  <!-- ── Panel 1: Topics ──────────────────────────────── -->
  <section class="panel" id="panel-topics">
    <div class="panel-header">
      <h2>Topics</h2>
      <div class="add-form">
        <input type="text" id="new-topic-name" placeholder="New topic…" maxlength="120" />
        <button class="btn btn-primary" id="add-topic-btn">+</button>
      </div>
    </div>
    <div class="panel-list" id="topic-list"></div>
    <div id="flagged-facts-item" class="flagged-facts-topic-item hidden">
      <span class="list-item-name">Flagged Facts</span>
      <span id="flagged-facts-count" class="list-item-badge flagged-badge"></span>
    </div>
  </section>

  <!-- ── Panel 2: Courses ──────────────────────────────── -->
  <section class="panel" id="panel-courses">
    <div class="panel-header">
      <h2>Courses <span class="panel-subtitle">optional tag</span></h2>
      <div class="add-form">
        <input type="text" id="new-course-name" placeholder="New course…" maxlength="120" />
        <button class="btn btn-primary" id="add-course-btn">+</button>
      </div>
    </div>
    <div class="panel-list" id="course-list"></div>
  </section>

  <!-- ── Panel 3: Facts ───────────────────────────────── -->
  <section class="panel" id="panel-facts">
    <div class="facts-add">
      <h2>Facts <button class="btn-import-pdf" id="import-pdf-btn">Import PDF</button></h2>
      <textarea id="new-fact-content" placeholder="Type a fact… (Ctrl+Enter to save)" disabled></textarea>
      <div class="facts-add-row">
        <button class="btn btn-primary" id="add-fact-btn" disabled>Save Fact</button>
      </div>
    </div>
    <div class="facts-list" id="facts-list">
      <div class="empty-state">Select a topic first</div>
    </div>
  </section>

</main>

<div id="questions-panel" class="hidden">
  <div class="questions-tab-bar">
    <button class="qtab-btn active" id="qtab-questions">Questions</button>
    <button class="qtab-btn" id="qtab-flagged">Flagged <span id="flagged-count" class="hidden"></span></button>
  </div>
  <div id="questions-view">
    <aside class="questions-sidebar">
      <div class="qs-label">Topic</div>
      <div class="questions-topic-list" id="questions-topic-list"></div>
    </aside>
    <section class="questions-content" id="questions-content">
      <div class="quiz-placeholder">Select a topic to see its questions.</div>
    </section>
  </div>
  <div id="flagged-view" class="hidden">
    <section class="flagged-content" id="flagged-content"></section>
  </div>
</div>

<div id="quiz-panel" class="hidden">
  <aside class="quiz-settings-pane">
    <div class="qs-group">
      <div class="qs-label">Category</div>
      <div class="seg-ctrl" id="quiz-cat-ctrl">
        <button class="seg-btn active" data-value="all">All</button>
        <button class="seg-btn" data-value="topic">Topic</button>
        <button class="seg-btn" data-value="course">Course</button>
      </div>
      <select id="quiz-filter-select" class="hidden quiz-select"></select>
    </div>
    <div class="qs-group">
      <div class="qs-label">Type</div>
      <div class="seg-ctrl" id="quiz-type-ctrl">
        <button class="seg-btn active" data-value="true_false">T / F</button>
        <button class="seg-btn active" data-value="multiple_choice">MC</button>
        <button class="seg-btn active" data-value="short_answer">SA</button>
      </div>
    </div>
    <div class="qs-group">
      <div class="qs-label">Status</div>
      <div class="seg-ctrl" id="quiz-status-ctrl">
        <button class="seg-btn active" data-value="due">Due</button>
        <button class="seg-btn" data-value="new">New only</button>
        <button class="seg-btn" data-value="all">All</button>
      </div>
    </div>
    <button class="btn btn-primary" id="start-quiz-btn">Start Quiz</button>
  </aside>
  <section class="quiz-content-pane" id="quiz-content">
    <div class="quiz-placeholder">Configure settings and press Start Quiz.</div>
  </section>
</div>

<!-- ── PDF Import Modal ──────────────────────────────────── -->
<div id="import-modal" class="modal-overlay hidden">
  <div class="modal-panel">
    <div class="modal-header">
      <h3 class="modal-title">Import from PDF</h3>
      <button class="modal-close" id="modal-close-btn">✕</button>
    </div>
    <div class="modal-body">

      <!-- File -->
      <div class="import-section">
        <div class="import-label">PDF File</div>
        <div class="file-pick-row">
          <label class="btn-file-pick" for="pdf-file-input">Choose PDF…</label>
          <input type="file" id="pdf-file-input" accept=".pdf" />
          <span id="pdf-filename" class="file-name-display">No file selected</span>
        </div>
      </div>

      <!-- Destination -->
      <div class="import-section">
        <div class="import-label">Destination</div>
        <div class="import-row">
          <div class="import-field">
            <label class="import-field-label">Topic</label>
            <select id="import-topic-select" class="import-select">
              <option value="">— select topic —</option>
            </select>
          </div>
          <div class="import-field">
            <label class="import-field-label">Course <span class="panel-subtitle">optional</span></label>
            <select id="import-course-select" class="import-select">
              <option value="">None</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Settings -->
      <div class="import-section">
        <div class="import-label">Extraction Settings</div>

        <div class="setting-row">
          <label class="setting-label">Max facts</label>
          <div class="seg-ctrl" id="max-facts-ctrl">
            <button class="seg-btn" data-value="1">1</button>
            <button class="seg-btn" data-value="3">3</button>
            <button class="seg-btn" data-value="5">5</button>
            <button class="seg-btn active" data-value="10">10</button>
            <button class="seg-btn" data-value="25">25</button>
            <button class="seg-btn" data-value="100">100</button>
          </div>
        </div>

        <div class="setting-row">
          <label class="setting-label">Focus</label>
          <select id="focus-select" class="import-select">
            <option value="general">General</option>
            <option value="theoretical">Theoretical Concepts</option>
            <option value="scientific">Scientific &amp; Technical</option>
            <option value="historical">Historical Facts</option>
            <option value="definitions">Key Definitions</option>
            <option value="processes">Processes &amp; How-It-Works</option>
          </select>
        </div>

        <div class="setting-row">
          <label class="setting-label">Difficulty</label>
          <div class="seg-ctrl" id="depth-ctrl">
            <button class="seg-btn active" data-value="easy">Easy</button>
            <button class="seg-btn" data-value="medium">Medium</button>
            <button class="seg-btn" data-value="hard">Hard</button>
          </div>
        </div>

        <div class="setting-row">
          <label class="setting-label">Pages</label>
          <div class="setting-control">
            <input type="number" id="start-page-input" value="1" min="1" max="9999" class="setting-num-input" placeholder="Start" />
            <span style="color:#a0aec0;font-size:0.85rem">to</span>
            <input type="number" id="end-page-input" value="20" min="1" max="9999" class="setting-num-input" placeholder="End" />
          </div>
        </div>

        <div class="setting-row">
          <label class="setting-label">Avoid duplicates</label>
          <label class="toggle-label">
            <input type="checkbox" id="avoid-dupes-check" />
            <span>Skip facts already in the selected topic</span>
          </label>
        </div>
      </div>

      <button class="btn btn-primary btn-extract" id="extract-btn" disabled>Extract Facts</button>

      <!-- Results -->
      <div id="extract-results" class="hidden">
        <div class="results-header">
          <div class="import-label" id="results-label">Extracted Facts</div>
          <span class="results-meta" id="results-meta"></span>
        </div>
        <div id="extracted-facts-list" class="extracted-facts-list"></div>
        <div class="import-actions">
          <div class="select-toggles">
            <button class="btn-text-action" id="select-all-btn">All</button>
            <button class="btn-text-action" id="select-none-btn">None</button>
          </div>
          <button class="btn btn-primary" id="import-btn" disabled>Import Selected</button>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
